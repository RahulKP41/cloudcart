  deploy:

    needs: build-and-push

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -R -f k8s/

      - name: Restart Deployments
        run: |
          kubectl rollout restart deployment user-deployment
          kubectl rollout restart deployment product-deployment
          kubectl rollout restart deployment order-deployment

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/user-deployment
          kubectl rollout status deployment/product-deployment
          kubectl rollout status deployment/order-deployment