apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deployment  
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata: 
      labels:
        app: order-service  
    spec:
      containers:
        - name: order-service
          image: cloudcart-order-service:latest
          ports:
            - containerPort: 3001 